            localStorage.setItem("ads_enabled", "false");
            localStorage.setItem("preferred_language", "en");
            document.cookie = "language=en; path=/; max-age=31536000";

<script defer src="/assets/js/skip-markers-overlay.js?v=skipoverlay6"></script>
    <script>
        (function () {
            var hostname = window.location.hostname;
            var isIpv4 = /^\d{1,3}(\.\d{1,3}){3}$/.test(hostname);
            var isLocal = hostname === "localhost" || hostname === "127.0.0.1";
            var isPrivate =
                isIpv4 &&
                (hostname.indexOf("10.") === 0 ||
                    hostname.indexOf("192.168.") === 0 ||
                    /^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname));

            if (!isLocal && !isPrivate) return;

            window.__DISABLE_LOCAL_SW__ = true;

            if ("serviceWorker" in navigator) {
                var resetKey = "flixer-local-sw-reset";
                Promise.all([
                    navigator.serviceWorker.getRegistrations(),
                    typeof caches === "undefined" ? Promise.resolve([]) : caches.keys()
                ]).then(function (results) {
                    var registrations = results[0];
                    var cacheNames = results[1];
                    var hadWorker = registrations.length > 0 || !!navigator.serviceWorker.controller;

                    return Promise.all(
                        registrations.map(function (registration) {
                            return registration.unregister();
                        })
                    ).then(function () {
                        if (typeof caches === "undefined") return;
                        return Promise.all(
                            cacheNames.map(function (cacheName) {
                                return caches.delete(cacheName);
                            })
                        );
                    }).then(function () {
                        if (hadWorker && !sessionStorage.getItem(resetKey)) {
                            sessionStorage.setItem(resetKey, "1");
                            window.location.reload();
                            return;
                        }
                        sessionStorage.removeItem(resetKey);
                    });
                }).catch(function (error) {
                    console.warn("Failed to reset local service workers:", error);
                });
            }
        }());
    </script>
