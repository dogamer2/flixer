<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Sports | Flixer</title>
  <style>
    :root {
      --bg: #080808;
      --panel: rgba(12, 12, 12, 0.92);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, 0.68);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(229, 9, 20, 0.15), transparent 30%),
        radial-gradient(circle at top right, rgba(0, 128, 255, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 16px 20px; background: var(--panel); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; }
    .title h1 { margin: 0; font-size: 16px; line-height: 1.2; }
    .title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border);
      color: var(--text); background: rgba(255, 255, 255, 0.04);
      text-decoration: none; white-space: nowrap;
    }
    .frame-wrap { position: relative; min-height: 0; }
    iframe { display: block; width: 100%; height: calc(100vh - 73px); border: 0; background: #000; }
    .status {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .status[hidden] { display: none; }
    .status-card {
      width: min(560px, 100%); padding: 28px; border: 1px solid var(--border);
      border-radius: 18px; background: rgba(18, 18, 18, 0.95); text-align: center;
    }
    .status-card h2 { margin: 0 0 10px; font-size: 22px; }
    .status-card p { margin: 0; color: var(--muted); line-height: 1.5; }
    @media (max-width: 640px) {
      .topbar { padding: 12px 14px; }
      .title h1 { font-size: 14px; }
      .title p { font-size: 11px; }
      iframe { height: calc(100vh - 65px); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <img src="/assets/images/logo.png" alt="Flixer">
        <div class="title">
          <h1>Live Sports</h1>
          <p>Local `mut.st` mirror on flixercc.pages.dev</p>
        </div>
      </div>
      <a class="back-btn" href="/">Back To Flixer</a>
    </div>
    <div class="frame-wrap">
      <div id="status" class="status">
        <div class="status-card">
          <h2>Loading sports</h2>
          <p>Preparing the local sports mirror and keeping navigation on this domain.</p>
        </div>
      </div>
      <iframe id="sports-frame" src="/mut.st/index.html" referrerpolicy="no-referrer"></iframe>
    </div>
  </div>

  <script>
    const frame = document.getElementById("sports-frame");
    const status = document.getElementById("status");
    const MUT_HOSTS = new Set(["mut.st", "www.mut.st", "mutstreams.st", "www.mutstreams.st", "mutstreams.pk", "www.mutstreams.pk", "themut.link", "www.themut.link"]);

    function toLocalMirrorPath(href, baseHref) {
      try {
        const url = new URL(href, baseHref);
        if (MUT_HOSTS.has(url.hostname)) {
          return `/mut.st${url.pathname}${url.search}${url.hash}`;
        }
        if (url.origin === window.location.origin && url.pathname.startsWith("/mut.st/")) {
          return `${url.pathname}${url.search}${url.hash}`;
        }
        if (url.origin === window.location.origin) {
          return `${url.pathname}${url.search}${url.hash}`;
        }
      } catch (_error) {
        try {
          const fallback = new URL(href, baseHref);
          return `/mut.st${fallback.pathname.replace(/^\/mut\.st/, "")}${fallback.search}${fallback.hash}`;
        } catch (_fallbackError) {}
      }
      return href;
    }

    function removeWarningBlocks(doc) {
      const textMatchers = [
        "please use the themut.link web address",
        "main domain is now",
        "visit now! bookmark it.",
        "visit flixercc.pages.dev to watch free movies and shows"
      ];
      Array.from(doc.querySelectorAll("a, div, p")).forEach((node) => {
        const text = (node.textContent || "").toLowerCase().replace(/\s+/g, " ").trim();
        if (!text) return;
        if (textMatchers.some((matcher) => text.includes(matcher))) {
          const block = node.closest("a, .multistream-banner, .container, div");
          if (block && block.parentNode) block.remove();
        }
      });
      doc.querySelectorAll(".multistream-banner").forEach((node) => node.remove());
    }

    function rewriteLinksAndAssets(doc) {
      const baseHref = doc.location.href;
      doc.querySelectorAll("a[href]").forEach((anchor) => {
        const localHref = toLocalMirrorPath(anchor.getAttribute("href"), baseHref);
        anchor.setAttribute("href", localHref);
        anchor.setAttribute("target", "_self");
        anchor.setAttribute("rel", "noopener noreferrer");
      });
      doc.querySelectorAll("img[src], source[src], iframe[src], link[href], script[src]").forEach((node) => {
        const attr = node.hasAttribute("src") ? "src" : "href";
        const raw = node.getAttribute(attr);
        if (!raw) return;
        try {
          const url = new URL(raw, baseHref);
          if (MUT_HOSTS.has(url.hostname)) {
            node.setAttribute(attr, `/mut.st${url.pathname}${url.search}${url.hash}`);
          }
        } catch (_error) {}
      });
    }

    function installNetworkRewrites(win) {
      if (!win || win.__flixerSportsProxyInstalled) return;
      win.__flixerSportsProxyInstalled = true;
      const rewriteUrl = (value) => typeof value === "string" ? toLocalMirrorPath(value, win.location.href) : value;
      const nativeFetch = win.fetch.bind(win);
      win.fetch = (input, init) => {
        if (typeof input === "string") return nativeFetch(rewriteUrl(input), init);
        if (input instanceof Request) return nativeFetch(new Request(rewriteUrl(input.url), input), init);
        return nativeFetch(input, init);
      };
      const NativeXHR = win.XMLHttpRequest;
      const open = NativeXHR.prototype.open;
      NativeXHR.prototype.open = function(method, url, ...rest) {
        return open.call(this, method, rewriteUrl(url), ...rest);
      };
    }

    function sanitizeFrame() {
      try {
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        if (!win || !doc) return;
        installNetworkRewrites(win);
        removeWarningBlocks(doc);
        rewriteLinksAndAssets(doc);
        status.hidden = true;
        const observer = new MutationObserver(() => {
          removeWarningBlocks(doc);
          rewriteLinksAndAssets(doc);
        });
        observer.observe(doc.documentElement, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ["href", "src"]
        });
      } catch (_error) {
        status.hidden = false;
        status.querySelector("h2").textContent = "Sports page failed to load";
        status.querySelector("p").textContent = "The local sports mirror could not be prepared. Check that /mut.st/index.html and /api/streams are deployed.";
      }
    }

    frame.addEventListener("load", sanitizeFrame);
  </script>
</body>
</html>
