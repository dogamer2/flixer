<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flixer Sports</title>
  <meta name="description" content="Live sports inside Flixer.">
  <style>
    :root { color-scheme: dark; --bg: #050505; --panel: rgba(13, 13, 16, 0.92); --panel-border: rgba(255, 255, 255, 0.08); --text: #f4f4f5; --muted: rgba(244, 244, 245, 0.66); --accent: #e50914; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(229, 9, 20, 0.18), transparent 28%), radial-gradient(circle at top right, rgba(0, 128, 255, 0.14), transparent 30%), var(--bg); color: var(--text); }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .chrome { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 18px; position: sticky; top: 0; z-index: 10; background: var(--panel); backdrop-filter: blur(18px); border-bottom: 1px solid var(--panel-border); }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img { width: 92px; height: auto; display: block; }
    .brand-copy strong, .brand-copy span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-copy span { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .button { appearance: none; border: 1px solid var(--panel-border); background: rgba(255, 255, 255, 0.04); color: var(--text); border-radius: 999px; padding: 10px 14px; font: inherit; cursor: pointer; transition: background-color 160ms ease, border-color 160ms ease, transform 160ms ease; text-decoration: none; }
    .button:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.16); transform: translateY(-1px); }
    .button--accent { background: var(--accent); border-color: transparent; font-weight: 600; }
    .stage { position: relative; min-height: 0; padding: 14px; }
    .frame { width: 100%; height: calc(100vh - 86px); border: 1px solid var(--panel-border); border-radius: 18px; background: #000; display: block; }
    .status { position: absolute; inset: 14px; display: grid; place-items: center; padding: 24px; text-align: center; color: var(--muted); background: linear-gradient(180deg, rgba(5, 5, 5, 0.72), rgba(5, 5, 5, 0.92)); border-radius: 18px; transition: opacity 180ms ease; pointer-events: none; }
    .status.hidden { opacity: 0; }
    @media (max-width: 720px) { .chrome { padding: 12px; } .brand img { width: 76px; } .brand-copy span { display: none; } .button { padding: 9px 12px; font-size: 14px; } .stage { padding: 10px; } .frame, .status { inset: 10px; height: calc(100vh - 76px); border-radius: 14px; } }
  </style>
</head>
<body>
  <div class="shell">
    <header class="chrome">
      <div class="brand">
        <img src="/assets/images/logo.png" alt="Flixer">
        <div class="brand-copy">
          <strong>Live Sports</strong>
          <span>Embedded same-origin mirror of the imported sports site.</span>
        </div>
      </div>
      <div class="actions">
        <a class="button" href="/">Back to Flixer</a>
        <button class="button button--accent" type="button" id="sports-home">Sports Home</button>
      </div>
    </header>
    <main class="stage">
      <iframe id="sports-frame" class="frame" src="/mut.st/index.html" loading="eager" referrerpolicy="no-referrer" title="Flixer Sports"></iframe>
      <div class="status" id="sports-status">Loading local sports mirror...</div>
    </main>
  </div>
  <script>
    const LOCAL_ROOT = "/mut.st";
    const REMOTE_HOSTS = new Set(["mutstreams.st", "www.mutstreams.st", "mutstreams.pk", "www.mutstreams.pk", "mut.st", "www.mut.st"]);
    const frame = document.getElementById("sports-frame");
    const status = document.getElementById("sports-status");
    const homeButton = document.getElementById("sports-home");

    function toLocalSportsUrl(value, currentPath) {
      if (!value || value.startsWith("javascript:") || value.startsWith("mailto:") || value.startsWith("tel:") || value.startsWith("#")) return value;
      try {
        const resolved = new URL(value, currentPath);
        if (REMOTE_HOSTS.has(resolved.hostname)) return LOCAL_ROOT + resolved.pathname + resolved.search + resolved.hash;
        if (resolved.origin === window.location.origin && resolved.pathname.startsWith(LOCAL_ROOT + "/")) return resolved.pathname + resolved.search + resolved.hash;
      } catch (error) {
        if (value.startsWith("/")) return value.startsWith(LOCAL_ROOT + "/") ? value : LOCAL_ROOT + value;
        return value;
      }
      if (value.startsWith("/")) return value.startsWith(LOCAL_ROOT + "/") ? value : LOCAL_ROOT + value;
      return value;
    }

    function rewriteDocument(doc) {
      const currentPath = doc.location.href;
      for (const node of doc.querySelectorAll("a[href]")) {
        const next = toLocalSportsUrl(node.getAttribute("href"), currentPath);
        if (next) {
          node.setAttribute("href", next);
          node.removeAttribute("target");
          node.removeAttribute("rel");
        }
      }
      for (const node of doc.querySelectorAll("img[src], script[src], link[href], source[src], video[src], iframe[src]")) {
        const attr = node.hasAttribute("href") ? "href" : "src";
        const next = toLocalSportsUrl(node.getAttribute(attr), currentPath);
        if (next) node.setAttribute(attr, next);
      }
    }

    function syncChrome() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;
        rewriteDocument(doc);
        const title = doc.title && doc.title.trim() ? doc.title.trim() : "Live Sports";
        document.title = "Flixer Sports | " + title;
        status.classList.add("hidden");
      } catch (error) {
        status.textContent = "Sports mirror failed to initialize.";
      }
    }

    frame.addEventListener("load", syncChrome);
    homeButton.addEventListener("click", () => {
      frame.src = LOCAL_ROOT + "/index.html";
      status.textContent = "Loading local sports mirror...";
      status.classList.remove("hidden");
    });
  </script>
</body>
</html>
