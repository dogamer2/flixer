            function updateMetaTagsForLanguage(lang) {
                const meta = SEO_META_TRANSLATIONS[lang] || SEO_META_TRANSLATIONS.en;
                document.title = meta.title;
                const descriptionMeta = document.querySelector('meta[name="description"]:last-of-type');
                if (descriptionMeta) {
                    descriptionMeta.setAttribute('content', meta.description);
                }
                const ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.setAttribute('content', meta.ogTitle);
                const ogDescription = document.querySelector('meta[property="og:description"]');
                if (ogDescription) ogDescription.setAttribute('content', meta.ogDescription);
                const twitterTitle = document.querySelector('meta[name="twitter:title"]');
                if (twitterTitle) twitterTitle.setAttribute('content', meta.twitterTitle);
                const twitterDescription = document.querySelector('meta[name="twitter:description"]');
                if (twitterDescription) twitterDescription.setAttribute('content', meta.twitterDescription);
                document.documentElement.setAttribute('lang', lang);
            }

            function detectSEOLanguage() {
                const pathLang = window.location.pathname.split('/')[1];
                if (pathLang && SEO_META_TRANSLATIONS[pathLang]) {
                    console.log(`Language detected from URL: ${pathLang}`);
                    return pathLang;
                }
                const storedLang = localStorage.getItem('preferred_language');
                if (storedLang && SEO_META_TRANSLATIONS[storedLang]) {
                    return storedLang;
                }
                const countryToLang = {
                    'ES': 'es',

                    'ID': 'jv',
                    'PK': 'pa',
                    'IN': 'pa',
                    'PL': 'pl',
                    'TR': 'tr',
                    'VN': 'vi'
                };
                if (window.userCountry && countryToLang[window.userCountry]) {
                    const langFromCountry = countryToLang[window.userCountry];
                    console.log(`Language detected from country ${window.userCountry}: ${langFromCountry}`);
                    return langFromCountry;
                }
                const browserLang = navigator.language.split('-')[0];
                if (SEO_META_TRANSLATIONS[browserLang]) {
                    console.log(`Language detected from browser: ${browserLang}`);
                    return browserLang;
                }
                console.log('Language defaulted to English');
                return 'en';
            }
            const seoDetectedLang = detectSEOLanguage();
            updateMetaTagsForLanguage(seoDetectedLang);
            window.addEventListener('storage', function(e) {
                if (e.key === 'preferred_language' && e.newValue) {
                    updateMetaTagsForLanguage(e.newValue);
                }
            });
            let lastSEOLang = seoDetectedLang;
            setInterval(() => {
                const currentLang = localStorage.getItem('preferred_language') || seoDetectedLang;
                if (currentLang !== lastSEOLang) {
                    updateMetaTagsForLanguage(currentLang);
                    lastSEOLang = currentLang;
                }
            }, 1000);
            window.updateMetaTagsForLanguage = updateMetaTagsForLanguage;
            window.SEO_META_TRANSLATIONS = SEO_META_TRANSLATIONS;
